name: CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04
    env:
      SMART_PROXY_PATH: ${{ github.workspace }}/tmp/smart-proxy-source

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Smart Proxy
        uses: actions/checkout@v4
        with:
          repository: theforeman/smart-proxy
          ref: 3.17.1
          path: tmp/smart-proxy-source

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

  build-gem:
    name: Build gem
    runs-on: ubuntu-22.04
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: Build gem
        run: gem build smart_proxy_dhcp_mikrotik.gemspec

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart_proxy_dhcp_mikrotik-gem
          path: smart_proxy_dhcp_mikrotik-*.gem

  build-deb:
    name: Build deb
    runs-on: ubuntu-22.04
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper dpkg-dev

      - name: Prepare packaging files
        run: chmod +x debian/rules

      - name: Build deb package
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p pkg/artifacts
          cp ../*.deb pkg/artifacts/
          cp ../*.changes pkg/artifacts/ || true
          cp ../*.buildinfo pkg/artifacts/ || true

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: foreman-proxy-plugin-dhcp-mikrotik-deb
          path: pkg/artifacts/*

  release:
    name: Release
    runs-on: ubuntu-22.04
    needs:
      - build-gem
      - build-deb
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download gem artifact
        uses: actions/download-artifact@v4
        with:
          name: smart_proxy_dhcp_mikrotik-gem
          path: release-artifacts/gem

      - name: Download deb artifact
        uses: actions/download-artifact@v4
        with:
          name: foreman-proxy-plugin-dhcp-mikrotik-deb
          path: release-artifacts/deb

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/gem/*.gem
            release-artifacts/deb/*.deb
            release-artifacts/deb/*.changes
            release-artifacts/deb/*.buildinfo
